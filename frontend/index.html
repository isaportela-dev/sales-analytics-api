<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        header {
            background: #0070f3;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 { font-size: 1.4rem; font-weight: 600; }
        header span { font-size: 0.85rem; opacity: 0.8; }

        .container { padding: 32px 40px; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0070f3;
        }

        .card .sub {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 4px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            background: #f7f8fa;
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge.won { background: #e6f9f0; color: #1a9e5c; }
        .badge.lost { background: #fdecea; color: #d32f2f; }
        .badge.pending { background: #fff8e1; color: #f59e0b; }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .grid2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Sales Analytics Dashboard</h1>
        <span>Real-time sales data & KPIs</span>
    </div>
</header>

<div class="container">

    <div class="cards">
        <div class="card">
            <div class="label">Total Revenue</div>
            <div class="value" id="total-revenue">—</div>
            <div class="sub">From won deals</div>
        </div>
        <div class="card">
            <div class="label">Conversion Rate</div>
            <div class="value" id="conversion-rate">—</div>
            <div class="sub" id="conversion-sub">—</div>
        </div>
        <div class="card">
            <div class="label">Average Ticket</div>
            <div class="value" id="avg-ticket">—</div>
            <div class="sub">Per won deal</div>
        </div>
        <div class="card">
            <div class="label">Top Product</div>
            <div class="value" id="top-product" style="font-size:1.1rem; padding-top:6px">—</div>
            <div class="sub" id="top-category">—</div>
        </div>
    </div>

    <div class="grid2">
        <div class="section">
            <h2>Top Customers</h2>
            <table>
                <thead>
                    <tr><th>Customer</th><th>Revenue</th></tr>
                </thead>
                <tbody id="top-customers-table">
                    <tr><td colspan="2">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>Recent Sales</h2>
            <table>
                <thead>
                    <tr><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th></tr>
                </thead>
                <tbody id="recent-sales-table">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const API = 'http://localhost:8000';

    function formatCurrency(value) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    }

    async function loadKPIs() {
        const res = await fetch(`${API}/analytics/total-revenue`);
        const data = await res.json();
        document.getElementById('total-revenue').textContent = formatCurrency(data.total_revenue);
    }

    async function loadConversion() {
        const res = await fetch(`${API}/analytics/conversion-rate`);
        const data = await res.json();
        document.getElementById('conversion-rate').textContent = `${data.conversion_rate}%`;
        document.getElementById('conversion-sub').textContent = `${data.won} won of ${data.total_sales} total`;
    }

    async function loadInsights() {
        const res = await fetch(`${API}/analytics/insights`);
        const data = await res.json();
        document.getElementById('avg-ticket').textContent = formatCurrency(data.average_ticket);
        document.getElementById('top-product').textContent = data.top_product || '—';
        document.getElementById('top-category').textContent = `Category: ${data.top_category || '—'}`;
    }

    async function loadTopCustomers() {
        const res = await fetch(`${API}/analytics/top-customers`);
        const data = await res.json();
        const tbody = document.getElementById('top-customers-table');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="2">No data</td></tr>'; return; }
        tbody.innerHTML = data.map(c => `
            <tr>
                <td>${c.customer}</td>
                <td>${formatCurrency(c.total)}</td>
            </tr>
        `).join('');
    }

    async function loadRecentSales() {
        const res = await fetch(`${API}/sales/`);
        const data = await res.json();
        const tbody = document.getElementById('recent-sales-table');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="4">No data</td></tr>'; return; }
        const recent = data.slice(-10).reverse();
        tbody.innerHTML = recent.map(s => `
            <tr>
                <td>${s.customer_name}</td>
                <td>${s.product}</td>
                <td>${formatCurrency(s.amount)}</td>
                <td><span class="badge ${s.status}">${s.status}</span></td>
            </tr>
        `).join('');
    }

    async function init() {
        await Promise.all([
            loadKPIs(),
            loadConversion(),
            loadInsights(),
            loadTopCustomers(),
            loadRecentSales()
        ]);
    }

    init();
</script>

</body>
</html>
